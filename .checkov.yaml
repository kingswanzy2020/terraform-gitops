# Checkov suppressions for lab/dev: avoids expensive or optional controls
# (flow logs, replication, detailed monitoring, etc.). Keep reviewing skips
# before production.
framework:
  - terraform

skip-check:
  # Cost / optional ops
  - CKV_AWS_144 # S3 cross-region replication
  - CKV_AWS_18 # S3 access logging (storage + requests)
  - CKV2_AWS_11 # VPC flow logging
  - CKV_AWS_126 # EC2 detailed monitoring
  - CKV_AWS_135 # EBS-optimized instances (extra charge on some types)
  # Design / security tradeoffs acceptable for this repo
  - CKV_AWS_382 # Broad egress from SG (common for app outbound)
  - CKV_AWS_130 # Public subnets map public IP on launch
  - CKV2_AWS_12 # Default VPC security group not locked down
  # IAM / logging scoping (CloudWatch with "*" resource)
  - CKV_AWS_111
  - CKV_AWS_356
  # S3 lifecycle & event notifications (extra config / services)
  - CKV2_AWS_61
  - CKV2_AWS_62
