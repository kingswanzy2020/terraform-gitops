name: Terraform Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - "modules/**"
      - "environments/**"
      - ".github/workflows/**"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.15.2"
  WORKING_DIR: environments/dev

jobs:
  lint:
    name: Lint and Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: Init TFLint
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint
        run: tflint --recursive --config "$(pwd)/.tflint.hcl" -f compact

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          soft_fail: false
          skip_check: CKV_AWS_144,CKV_AWS_145,CKV_AWS_382,CKV_AWS_126,CKV_AWS_135,CKV_AWS_111,CKV_AWS_356,CKV_AWS_130,CKV_AWS_62,CKV_AWS_61,CKV_AWS_11,CKV_AWS_12,CKV_AWS_18,CKV_AWS_338,CKV_AWS_158,CKV_AWS_300,CKV_AWS_149,CKV_AWS_118,CKV_AWS_353,CKV_AWS_226,CKV_AWS_161,CKV_AWS_157,CKV_AWS_293,CKV_AWS_129,CKV2_AWS_30,CKV2_AWS_60,CKV2_AWS_57

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        working-directory: ${{ env.WORKING_DIR }}

      - name: Post Plan to PR
        uses: borchero/terraform-plan-comment@v2
        with:
          token: ${{ github.token }}
          planfile: tfplan
          working-directory: ${{ env.WORKING_DIR }}
